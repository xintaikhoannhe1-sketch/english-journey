<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>English Journey</title>
<meta name="theme-color" content="#131F24">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Journey">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#131F24}
body{min-height:100%;width:100%;overflow-x:hidden;font-family:'Nunito',sans-serif;font-size:16px;background:#131F24;overscroll-behavior:none;color:#fff}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none}
input{outline:none}
a{-webkit-tap-highlight-color:transparent}

/* ===== RESPONSIVE WRAPPER ===== */
/* Mobile: full width. Tablet/Desktop: centered max-width card */
.app-wrap{width:100%;min-height:100vh;display:flex;flex-direction:column;background:#131F24}
@media(min-width:600px){
  body{display:flex;justify-content:center;background:#0d1820}
  .app-wrap{max-width:520px;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,.6);position:relative}
}
@media(min-width:900px){
  .app-wrap{max-width:560px}
}

/* ===== SCREENS ===== */
.S{display:none;flex-direction:column;min-height:100vh;width:100%}.S.on{display:flex}

/* ===== ANIMATIONS ===== */
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(90vh) rotate(700deg)}}
@keyframes gl{0%,100%{box-shadow:0 0 8px rgba(28,176,246,.4)}50%{box-shadow:0 0 20px rgba(28,176,246,.7)}}
@keyframes si{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cp{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes sk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes sqRun{0%{left:6px}100%{left:calc(100% - 58px)}}
@keyframes sqWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
@keyframes tp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes rpulse{0%{box-shadow:0 0 0 0 rgba(255,75,75,.5)}70%{box-shadow:0 0 0 15px rgba(255,75,75,0)}100%{box-shadow:0 0 0 0 rgba(255,75,75,0)}}
.as{animation:su .4s ease-out both}.ab{animation:bn 2s infinite}.ap{animation:pl 1.5s infinite}
.T:active{transform:scale(.95);transition:transform .1s}

/* ===== PROGRESS BAR ===== */
.pbar{display:flex;align-items:center;gap:12px;padding:12px 16px}
.pbar-x{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#566570;flex-shrink:0}
.pbar-track{flex:1;height:14px;background:#37464F;border-radius:8px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,#FFC800,#FF9600);border-radius:8px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.combo{text-align:center;font-size:15px;font-weight:900;color:#FFC800;animation:cp .3s ease-out;margin-bottom:-4px}

/* ===== CHARACTER AREA ===== */
.char-area{display:flex;align-items:center;gap:12px;padding:12px 20px;justify-content:center}
.char-img{font-size:72px;position:relative;line-height:1;min-width:88px}
.char-shadow{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:50px;height:10px;background:rgba(0,0,0,.3);border-radius:50%;filter:blur(4px)}
.speech-bub{background:#1B2B34;border:2px solid #37464F;border-radius:16px;padding:12px 18px;position:relative;max-width:220px;flex:1}
.speech-bub::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:#37464F}
.speech-bub .aud{display:inline-flex;align-items:center;gap:8px;font-size:17px;font-weight:800;color:#1CB0F6;cursor:pointer}
.speech-bub .aud-icon{width:26px;height:26px;background:#1CB0F6;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px}

/* ===== OPTIONS ===== */
.opts-list{display:flex;flex-direction:column;gap:10px;padding:0 16px}
.opt-fw{width:100%;padding:14px 20px;border-radius:14px;font-size:17px;font-weight:700;text-align:center;background:#1B2B34;border:2px solid #37464F;color:#E5E5E5;transition:all .15s}
.opt-fw.selected{border-color:#1CB0F6;background:#1B3644;color:#1CB0F6}
.opt-fw.correct{border-color:#58CC02;background:#1B3424;color:#58CC02}
.opt-fw.wrong{border-color:#FF4B4B;background:#3B1B1B;color:#FF4B4B;animation:sk .4s}

/* ===== RESULT PANEL ===== */
.rp{position:sticky;bottom:0;left:0;right:0;padding:16px;z-index:50;animation:si .3s ease-out;margin-top:auto}
.rp.ok{background:#1B3424;border-top:2px solid #58CC02}
.rp.no{background:#3B1B1B;border-top:2px solid #FF4B4B}
.rp-label{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rp-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
.rp-icon.ok{background:#58CC02;color:#fff}.rp-icon.no{background:#FF4B4B;color:#fff}
.rp-text{font-size:20px;font-weight:900}
.rp-text.ok{color:#58CC02}.rp-text.no{color:#FF4B4B}
.rp-sub{font-size:14px;color:#ABB5BA;margin-bottom:10px}
.btn-ct{width:100%;padding:15px;border-radius:14px;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.btn-ct.ok{background:#58CC02;color:#fff}.btn-ct.no{background:#FF4B4B;color:#fff}

/* ===== CHECK BUTTON ===== */
.btn-chk{width:calc(100% - 32px);margin:0 16px;padding:15px;border-radius:14px;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px;background:#58CC02;color:#fff;display:block}
.btn-chk.dis{background:#37464F;color:#566570;pointer-events:none}
.bsp{height:80px}

/* ===== REPEAT READ ===== */
.repeat-sec{background:#1B2B34;border:1px solid #37464F;border-radius:14px;padding:14px;margin:8px 0;text-align:center}
.repeat-word{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
.repeat-ph{font-size:14px;color:#1CB0F6;margin-bottom:10px}
.mic-sm{width:56px;height:56px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin:4px}
.mic-sm.off{background:#FF4B4B;animation:rpulse 1.5s infinite}
.mic-sm.on{background:#FF4B4B;animation:pl .8s infinite}
.mic-sm.pass{background:#58CC02}
.repeat-status{font-size:13px;color:#566570;margin-top:6px}
.repeat-ok{font-size:15px;font-weight:800;color:#58CC02;margin-top:6px}
.repeat-fail{font-size:13px;color:#FF9600;margin-top:6px}

/* ===== WORD BANK ===== */
.wb-placed{min-height:52px;border-bottom:2px solid #37464F;margin:0 16px 8px;padding:8px 0;display:flex;flex-wrap:wrap;gap:8px}
.wb-placed2{min-height:36px;border-bottom:2px solid #37464F;margin:0 16px 12px;padding:4px 0}
.wb-bank{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;justify-content:center;margin-bottom:80px}
.wb-word{padding:10px 14px;border-radius:12px;font-size:15px;font-weight:700;background:#1B2B34;border:2px solid #37464F;color:#E5E5E5}
.wb-word.placed{background:#37464F;color:#58CC02;border-color:#58CC02}

/* ===== CHAT ===== */
.chat{display:flex;flex-direction:column;gap:10px;padding:12px;overflow-y:auto;flex:1}
.bub{display:flex;align-items:flex-start;gap:10px;animation:tp .4s ease-out both}
.bub-av{flex-shrink:0;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#fcd34d,#f97316);display:flex;align-items:center;justify-content:center;font-size:18px}
.bub-box{max-width:85%;background:#1B2B34;border:1px solid #37464F;border-radius:0 16px 16px 16px;padding:12px 14px;font-size:14px;line-height:1.6;color:#CDD4DA}
.bub-name{font-size:10px;font-weight:800;color:#FFC800;margin-bottom:2px}
.bub-hl{background:rgba(88,204,2,.15);border:1px solid #58CC02;border-radius:10px;padding:8px 12px;margin:8px 0;font-weight:800;color:#58CC02;text-align:center;font-size:16px}
.bub-img{width:100%;border-radius:12px;margin:8px 0;max-height:150px;object-fit:contain;background:transparent}
.listen-inline{display:inline-flex;align-items:center;gap:6px;background:#1CB0F6;color:#fff;padding:7px 14px;border-radius:12px;font-size:13px;font-weight:700;margin:6px 0}
.colan-speak{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#FF9600,#FFC800);color:#131F24;padding:6px 12px;border-radius:12px;font-size:12px;font-weight:800;margin:4px 4px 4px 0}
.speak-both{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#CE82FF,#A855F7);color:#fff;padding:6px 12px;border-radius:12px;font-size:12px;font-weight:800;margin:4px 0}

/* ===== MAP ===== */
#mapS{background:linear-gradient(180deg,#131F24,#1B2B34,#131F24);overflow-y:auto}
.resume{background:linear-gradient(90deg,#FFC800,#FF9600);border-radius:16px;padding:14px 16px;margin:0 16px 14px;display:flex;align-items:center;gap:12px}
.resume-t{font-size:14px;font-weight:700;color:#131F24;flex:1}
.resume-b{background:#131F24;color:#FFC800;font-weight:800;font-size:13px;padding:8px 14px;border-radius:12px;white-space:nowrap}

/* ===== MIC ===== */
.mic-btn{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;margin-bottom:8px}
.mic-btn.off{background:#FF4B4B;box-shadow:0 4px 20px rgba(255,75,75,.4)}
.mic-btn.on{background:#FF4B4B;animation:pl 1s infinite}

/* ===== SPLASH ===== */
#splash{background:linear-gradient(180deg,#131F24,#1B2B34);align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto}

/* ===== ASSIGN CARDS ===== */
.acard{background:#1B2B34;border:1px solid #37464F;border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.acard-i{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* ===== CONFETTI ===== */
.cfx{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cfp{position:absolute;border-radius:50%;animation:cf ease-out forwards}

/* ===== VOICE ===== */
.voice-sel{position:fixed;top:0;right:0;z-index:100;padding:4px}
@media(min-width:600px){.voice-sel{right:calc(50% - 260px)}}
@media(min-width:900px){.voice-sel{right:calc(50% - 280px)}}
.voice-btn{background:#1B2B34;border:1px solid #37464F;color:#ABB5BA;font-size:11px;padding:4px 8px;border-radius:8px;font-family:Nunito,sans-serif}
.voice-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.voice-list{background:#1B2B34;border:1px solid #37464F;border-radius:16px;padding:16px;width:100%;max-width:380px;max-height:75vh;overflow-y:auto}
.voice-item{padding:12px;border-radius:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:2px solid #37464F;cursor:pointer}
.voice-item.active{border-color:#FFC800;background:rgba(255,200,0,.08)}
.av-img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.bub-av img,.colan-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}

/* ===== INSTALL BAR ===== */
.install-bar{background:linear-gradient(90deg,#1CB0F6,#1899D6);border-radius:14px;padding:12px 16px;margin:0 16px 12px;display:flex;align-items:center;gap:10px}
.install-bar p{flex:1;font-size:13px;font-weight:700;color:#fff}
.install-bar button{background:#fff;color:#1CB0F6;font-weight:800;font-size:12px;padding:8px 12px;border-radius:10px;white-space:nowrap}
.install-bar .close{background:none;color:rgba(255,255,255,.7);font-size:18px;padding:4px 8px}

/* ===== FLASHCARD ===== */
.fc-wrap{perspective:1000px;width:calc(100% - 32px);height:200px;margin:8px 16px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.fc-front{background:linear-gradient(135deg,#1B2B34,#37464F);border:2px solid #37464F}
.fc-back{background:linear-gradient(135deg,#1a3d6b,#1CB0F6);border:2px solid #1CB0F6;transform:rotateY(180deg)}

/* ===== SPEED / HINT / REVIEW ===== */
.spd-btn{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #37464F}
.spd-btn.active{background:#1CB0F6;color:#fff;border-color:#1CB0F6}
.spd-btn.inactive{background:#1B2B34;color:#566570}
.review-banner{background:rgba(255,200,0,.1);border:1px solid #FFC800;border-radius:12px;padding:10px 16px;margin:8px 16px;text-align:center}
.hint-btn{font-size:12px;color:#FFC800;background:none;padding:4px 8px;border:none;cursor:pointer}
.hint-btn.used{color:#566570;text-decoration:line-through}

/* ===== LESSON SCREEN SCROLL FIX ===== */
#lesson{overflow-y:auto}
</style>
</head>

function makeSVG(em, word, color1, color2) {
  var s = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">'
    + '<defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">'
    + '<stop offset="0%" style="stop-color:' + color1 + '"/>'
    + '<stop offset="100%" style="stop-color:' + color2 + '"/>'
    + '</linearGradient></defs>'
    + '<rect width="300" height="200" fill="url(#g1)" rx="16"/>'
    + '<circle cx="40" cy="35" r="8" fill="rgba(255,255,255,.2)">'
    + '<animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/></circle>'
    + '<circle cx="265" cy="155" r="12" fill="rgba(255,255,255,.15)">'
    + '<animate attributeName="r" values="8;14;8" dur="3s" repeatCount="indefinite"/></circle>'
    + '<circle cx="255" cy="45" r="6" fill="rgba(255,255,255,.25)">'
    + '<animate attributeName="cy" values="45;35;45" dur="2.5s" repeatCount="indefinite"/></circle>'
    + '<circle cx="50" cy="155" r="5" fill="rgba(255,255,255,.2)">'
    + '<animate attributeName="cx" values="50;65;50" dur="3.5s" repeatCount="indefinite"/></circle>'
    + '<text x="150" y="108" text-anchor="middle" font-size="72">'
    + '<animateTransform attributeName="transform" type="translate"'
    + ' values="0,0;0,-8;0,0" dur="2s" repeatCount="indefinite"/>'
    + em + '</text>'
    + '<rect x="50" y="152" width="200" height="34" rx="10" fill="rgba(0,0,0,.35)"/>'
    + '<text x="150" y="174" text-anchor="middle" font-size="17"'
    + ' font-weight="bold" fill="#fff" font-family="Arial,sans-serif">'
    + word + '</text>'
    + '</svg>';
  return s;
}

function getVocabImg(stId, vi) {
  var v = SD[stId] && SD[stId].vocab[vi];
  if (!v) return '';
  var colors = LEVEL_COLORS[stId] || ['#1a3d6b','#2980b9'];
  var svgStr = makeSVG(v.em, v.en, colors[0], colors[1]);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

}

/* ============ SCORE FUNCTIONS ============ */
function normalize(s){
  return s.toLowerCase().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ').trim();
}

function phonSim(a,b){
  var rules=[[/th/g,'d'],[/\bv/g,'w'],[/r$/,'l'],[/(ed|s|ing)$/,'']];
  function applyRules(w){rules.forEach(function(r){w=w.replace(r[0],r[1]);});return w;}
  return applyRules(a)===applyRules(b);
}

function calcScore(expected,spoken){
  var ew=normalize(expected).split(' ');
  var sw=normalize(spoken).split(' ');
  var total=0;
  ew.forEach(function(w){
    var best=0;
    sw.forEach(function(s){
      if(s===w){best=Math.max(best,1);return;}
      if(phonSim(s,w)){best=Math.max(best,0.6);return;}
      if(w.replace(/(s|ed|ing)$/,'')===s){best=Math.max(best,0.8);}
    });
    total+=best;
  });
  return Math.round(total/ew.length*100);
}

    if(!isOk)h+='<div class="rp-sub">Cần ít nhất 35% — Thử lại hoặc tiếp tục</div>';
    h+='<button class="T btn-ct '+(isOk?"ok":"no")+'" onclick="nS()">Tiếp tục</button></div>';
  }
  $("lesson").innerHTML=h;
}

window.tM=function(){
  if(ls.rec)return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  var r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=3;
  ls.rec=true;ls.tr="";ls.sr=null;rS();
  r.onresult=function(e){
    var s=e.results[0][0].transcript.toLowerCase().trim();
    var x=D().speakQ[ls.qi].t.toLowerCase().trim();
    ls.tr=s;
    var p=calcScore(x,s);ls.ss=p;
    if(p>=35){
      ls.sr="ok";bp(1);ls.xp+=10;ls.combo++;fc();
      setTimeout(function(){spVi("Phát âm tốt lắm! "+p+" phần trăm!");},400);
    }else{
      ls.sr="no";bp(0);ls.h--;ls.combo=0;
      setTimeout(function(){spVi("Chỉ "+p+" phần trăm thôi. Thử lại nhé!");},400);
    }
    ls.rec=false;sa();rS();
  };
  r.onerror=function(){ls.rec=false;rS();};
  r.onend=function(){if(ls.rec){ls.rec=false;rS();}};
  r.start();
};

window.nS=function(){
  if(ls.h<=0){ls.qi=0;ls.h=3;ls.xp=0;ls.combo=0;}
  else if(ls.qi<4)ls.qi++;
  else{ls.xt+=ls.xp;ls.ph="done";}
  ls.sr=null;ls.tr="";ls.ss=0;ls.rec=false;sa();rl();
};

/* ====== DONE ====== */
function rD(){
  fc();
  var xp=ls.xt||0,d=D();
  var el=$("lesson");
  el.style.background="#131F24";el.style.alignItems="center";el.style.justifyContent="center";el.style.textAlign="center";el.style.padding="24px";
  var h='<div style="font-size:80px;margin-bottom:16px" class="ab">🏆</div>';
  h+='<h2 style="font-size:24px;font-weight:900;color:#FFC800;margin-bottom:8px">Xuất sắc!</h2>';
  h+='<p style="font-size:16px;color:#566570;margin-bottom:20px">Hoàn thành Trạm '+ls.st+': '+d.name+'!</p>';
  h+='<div style="background:#1B2B34;border:1px solid #37464F;border-radius:16px;padding:20px;width:100%;max-width:320px;margin-bottom:20px">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="color:#566570">Tổng XP</span><span style="font-weight:900;color:#FFC800">⚡ '+xp+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="color:#566570">Combo</span><span style="font-weight:900;color:#FF9600">x'+ls.combo+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="color:#566570">Streak</span><span style="font-weight:900;color:#FF9600">🔥 '+(sv.streak||0)+' ngày</span></div>';
  h+='</div>';
  h+='<button class="T" style="width:100%;max-width:320px;padding:16px;border-radius:14px;font-size:17px;font-weight:800;background:#58CC02;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-top:8px" onclick="fin()">Tiếp tục</button>';
  el.innerHTML=h;
}

window.fin=function(){
  sv.u=Math.max(sv.u,ls.st+1);sv.xp+=ls.xt||0;
  var today=new Date().toISOString().slice(0,10);
  if(sv.lastDate!==today){sv.streak=(sv.streak||0)+1;sv.lastDate=today;}
  if(sv.streak===3||sv.streak===7||sv.streak===30){
    fc();spVi('Tuyệt vời! Em đã học '+sv.streak+' ngày liên tiếp! Cô rất tự hào!');
  }
  ls.ph="";sa();$("lesson").style="";goMap();
};

/* ====== PWA ====== */
if('serviceWorker' in navigator){
  var swCode='self.addEventListener("install",function(e){self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});self.addEventListener("fetch",function(e){e.respondWith(fetch(e.request).catch(function(){return new Response("Offline")}))});';
  var swBlob=new Blob([swCode],{type:'application/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}
var manifest={name:"English Journey",short_name:"EngJourney",start_url:location.href,display:"standalone",background_color:"#131F24",theme_color:"#131F24"};
var mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
var mUrl=URL.createObjectURL(mBlob);
var mLink=document.createElement('link');mLink.rel='manifest';mLink.href=mUrl;document.head.appendChild(mLink);

/* ====== VOICE SELECTOR ====== */
var selectedVoiceVI=null;
var selectedVoiceEN=null;

window.showVoices=function(){
  var vs=speechSynthesis.getVoices();
  var viVoices=vs.filter(function(v){return v.lang.indexOf("vi")===0;});
  var enVoices=vs.filter(function(v){return v.lang.indexOf("en")===0&&/female|samantha|zira|karen|google.*us|fiona/i.test(v.name);});
  if(enVoices.length===0)enVoices=vs.filter(function(v){return v.lang.indexOf("en")===0;});
  var h='<div class="voice-modal" onclick="closeVoices()">';
  h+='<div class="voice-list" onclick="event.stopPropagation()">';
  h+='<h3 style="font-size:16px;font-weight:900;color:#FFC800;margin-bottom:12px">🔊 Giọng Cô Lan (Tiếng Việt)</h3>';
  if(viVoices.length===0)h+='<p style="color:#566570;font-size:13px;margin-bottom:12px">Không tìm thấy giọng Việt. Dùng Chrome Android.</p>';
  viVoices.forEach(function(v,i){
    var active=selectedVoiceVI&&selectedVoiceVI.name===v.name?"active":"";
    h+='<div class="voice-item '+active+'" onclick="pickVoiceVI('+i+')">';
    h+='<div style="font-size:20px">🇻🇳</div>';
    h+='<div style="flex:1"><p style="font-size:14px;font-weight:700;color:#fff">'+v.name+'</p><p style="font-size:11px;color:#566570">'+v.lang+'</p></div>';
    h+='<button class="T" style="background:#FF9600;color:#fff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700" onclick="event.stopPropagation();testVoiceVI('+i+')">Thử</button></div>';
  });
  h+='<h3 style="font-size:16px;font-weight:900;color:#1CB0F6;margin:16px 0 12px">🔊 Giọng tiếng Anh</h3>';
  enVoices.slice(0,8).forEach(function(v,i){
    var active=selectedVoiceEN&&selectedVoiceEN.name===v.name?"active":"";
    h+='<div class="voice-item '+active+'" onclick="pickVoiceEN('+i+')">';
    h+='<div style="font-size:20px">🇺🇸</div>';
    h+='<div style="flex:1"><p style="font-size:14px;font-weight:700;color:#fff">'+v.name+'</p><p style="font-size:11px;color:#566570">'+v.lang+'</p></div>';
    h+='<button class="T" style="background:#1CB0F6;color:#fff;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700" onclick="event.stopPropagation();testVoiceEN('+i+')">Thử</button></div>';
  });
  h+='<button class="T" style="width:100%;padding:14px;border-radius:14px;background:#58CC02;color:#fff;font-size:16px;font-weight:800;margin-top:12px" onclick="closeVoices()">Xong ✅</button>';
  h+='</div></div>';
  $("voiceModal").innerHTML=h;$("voiceModal").style.display="block";
};

window.closeVoices=function(){$("voiceModal").style.display="none";};
window.pickVoiceVI=function(i){var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("vi")===0;});selectedVoiceVI=vs[i]||null;try{localStorage.setItem("ej_voice_vi",selectedVoiceVI?selectedVoiceVI.name:"");}catch(e){}showVoices();spVi("Xin chào! Đây là giọng mới của cô Lan!");};
window.pickVoiceEN=function(i){var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("en")===0&&/female|samantha|zira|karen|google.*us|fiona/i.test(v.name);});if(vs.length===0)vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("en")===0;});selectedVoiceEN=vs[i]||null;try{localStorage.setItem("ej_voice_en",selectedVoiceEN?selectedVoiceEN.name:"");}catch(e){}showVoices();sp("Hello! This is the new English voice!",0.8);};
window.testVoiceVI=function(i){var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("vi")===0;});var v=vs[i];if(!v)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance("Xin chào các em! Cô là Lan!");u.lang="vi-VN";u.voice=v;u.rate=1;speechSynthesis.speak(u);};
window.testVoiceEN=function(i){var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("en")===0&&/female|samantha|zira|karen|google.*us|fiona/i.test(v.name);});if(vs.length===0)vs=speechSynthesis.getVoices().filter(function(v){return v.lang.indexOf("en")===0;});var v=vs[i];if(!v)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance("Hello! I am your English teacher!");u.lang="en-US";u.voice=v;u.rate=0.8;speechSynthesis.speak(u);};

function loadVoicePrefs(){
  try{
    if(typeof speechSynthesis==="undefined")return;
    var vs=speechSynthesis.getVoices();
    var svn=localStorage.getItem("ej_voice_vi");
    var sen=localStorage.getItem("ej_voice_en");
    if(svn){selectedVoiceVI=vs.find(function(v){return v.name===svn;})||null;}
    if(sen){selectedVoiceEN=vs.find(function(v){return v.name===sen;})||null;}
  }catch(e){}
}
if(typeof speechSynthesis!=="undefined"){
  speechSynthesis.onvoiceschanged=loadVoicePrefs;
}
setTimeout(loadVoicePrefs,500);

function initSplash(){
  var box=$("splashAvBox");
  if(!box)return;
  box.innerHTML='<div style="display:flex;align-items:flex-start;gap:12px">'
    +'<div style="width:110px;height:110px;border-radius:50%;overflow:hidden;flex-shrink:0;border:3px solid #FFC800">'
    +'<img src="'+AVATAR+'" style="width:100%;height:100%;object-fit:cover"></div>'
    +'<div style="text-align:left">'
    +'<p style="font-size:13px;font-weight:800;color:#FFC800">Cô Lan</p>'
    +'<p style="font-size:13px;color:#ABB5BA;line-height:1.5">Chào các em! Cô là Lan, cô sẽ dạy các em tiếng Anh từ con số 0 nhé! Đừng lo, cô dạy dễ hiểu lắm! 💪</p>'
    +'</div></div>';
}

/* ====== INIT ====== */
ld();
initSplash();
if(sv.xp>0||sv.u>1||ls.ph)goMap();
try{if(typeof speechSynthesis!=="undefined")speechSynthesis.getVoices();}catch(e){}
</script>
